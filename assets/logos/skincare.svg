<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 360" fill="none">
  <defs>
    <linearGradient id="lotusGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6B2E8E"/>
      <stop offset="60%" stop-color="#B56BC9"/>
      <stop offset="100%" stop-color="#F3C7E0"/>
    </linearGradient>
  </defs>
  <!-- Lotus -->
  <g transform="translate(300 130)">
    <path d="M0 -80 C -30 -40 -30 0 0 20 C 30 0 30 -40 0 -80 Z" fill="url(#lotusGrad)"/>
    <path d="M0 20 C -45 0 -80 -20 -90 10 C -80 40 -30 50 0 40 Z" fill="url(#lotusGrad)" opacity="0.95"/>
    <path d="M0 20 C 45 0 80 -20 90 10 C 80 40 30 50 0 40 Z" fill="url(#lotusGrad)" opacity="0.95"/>
    <path d="M0 30 C -60 10 -120 30 -110 60 C -80 80 -30 70 0 55 Z" fill="url(#lotusGrad)" opacity="0.85"/>
    <path d="M0 30 C 60 10 120 30 110 60 C 80 80 30 70 0 55 Z" fill="url(#lotusGrad)" opacity="0.85"/>
  </g>
  <!-- Wordmark -->
  <text x="300" y="260" text-anchor="middle" font-family="'Playfair Display', serif" font-size="52" font-weight="700" fill="#8A8A8A" letter-spacing="2">OHM<tspan fill="#9B9B9B">Pharma</tspan></text>
  <!-- Tagline -->
  <line x1="150" y1="300" x2="230" y2="300" stroke="#E89BC4" stroke-width="2"/>
  <text x="300" y="310" text-anchor="middle" font-family="'Dancing Script', cursive" font-size="32" font-style="italic" fill="#6B2E8E">I Love Myself</text>
  <line x1="370" y1="300" x2="450" y2="300" stroke="#E89BC4" stroke-width="2"/>
</svg>
