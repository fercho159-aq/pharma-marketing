<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Producto | OHM Pharma</title>
<meta name="description" content="Detalle de producto OHM Pharma.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/styles.css">
</head>
<body data-section="">

<div id="site-header"></div>

<section class="page-header">
  <div class="container">
    <div class="breadcrumbs" id="pd-breadcrumbs"><a href="index.html">Inicio</a> / <span>Producto</span></div>
  </div>
</section>

<section>
  <div class="container">
    <div id="product-detail"></div>
  </div>
</section>

<!-- Productos relacionados -->
<section style="background:var(--bg-soft)">
  <div class="container">
    <div class="section-head">
      <span class="eyebrow">Quienes vieron esto también compraron</span>
      <h2>Te podría interesar</h2>
    </div>
    <div class="products" id="related"></div>
  </div>
</section>

<div id="site-footer"></div>
<div id="wa-float"></div>

<script src="assets/js/products.js"></script>
<script src="assets/js/main.js"></script>
<script src="assets/js/cart.js"></script>
<script src="assets/js/render.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', () => {
    renderProductDetail();
    const id = new URLSearchParams(location.search).get('id');
    const current = getProductById(id);
    if (current) {
      const related = PRODUCTS.filter(p => p.section === current.section && p.id !== current.id).slice(0, 4);
      renderProducts('#related', related);
      // Also apply color theme if skincare
      if (current.section === 'skincare') document.body.classList.add('theme-skincare');
    }
  });
</script>
</body>
</html>
