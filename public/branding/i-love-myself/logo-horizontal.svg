    <path d="M0 15 C -30 5 -60 15 -55 30 C -40 40 -15 35 0 28 Z" fill="url(#lotusGrad)" opacity="0.85"/>
    <path d="M0 15 C 30 5 60 15 55 30 C 40 40 15 35 0 28 Z" fill="url(#lotusGrad)" opacity="0.85"/>
  </g>
  <!-- OHMPharma wordmark -->
